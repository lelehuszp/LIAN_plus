log-level: info
external-controller: 0.0.0.0:9090
dns:
  enable: true
  listen: 0.0.0.0:53
  enhanced-mode: fake-ip
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 8.8.8.8
  fallback:
    - tls://8.8.8.8:853
    - tls://1.1.1.1:853
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4

proxies: 
  # 此处将自动填入来自订阅 {your_subscribe_url} 的节点
  # 转换器会自动获取订阅中的所有节点

proxy-groups:
  - name: "🔰 可用节点"
    type: url-test
    # 这里将对所有节点进行延迟和可用性测试
    url: "http://www.gstatic.com/generate_204"
    interval: 300
    tolerance: 50
    # 注意：此处使用通配符 * 表示包含所有原始节点
    proxies: 
      - "自动选择"
      - "香港"
      - "台湾"
      - "日本"
      - "新加坡"
      - "美国"
      - "*"

  - name: "🎯 代理服务"
    type: select
    proxies:
      - "🔰 可用节点"
      - "DIRECT"

rules:
  # 本地和局域网直连
  - DOMAIN-SUFFIX,local,DIRECT
  - IP-CIDR,127.0.0.0/8,DIRECT
  - IP-CIDR,192.168.0.0/16,DIRECT
  - IP-CIDR,10.0.0.0/8,DIRECT
  - IP-CIDR,172.16.0.0/12,DIRECT
  - IP-CIDR,100.64.0.0/10,DIRECT

  # 广告屏蔽 (可选)
  # - DOMAIN-SUFFIX,ads.com,REJECT

  # ==== 核心：Google 及 YouTube 服务代理 ====
  - DOMAIN-SUFFIX,google.com,🎯 代理服务
  - DOMAIN-SUFFIX,gstatic.com,🎯 代理服务
  - DOMAIN-SUFFIX,googleapis.com,🎯 代理服务
  - DOMAIN-SUFFIX,googleusercontent.com,🎯 代理服务
  - DOMAIN-SUFFIX,ggpht.com,🎯 代理服务
  - DOMAIN-SUFFIX,google.cn,🎯 代理服务
  - DOMAIN-SUFFIX,gmail.com,🎯 代理服务
  - DOMAIN-SUFFIX,googlemail.com,🎯 代理服务
  - DOMAIN-SUFFIX,googlevideo.com,🎯 代理服务
  - DOMAIN-SUFFIX,youtube.com,🎯 代理服务
  - DOMAIN-SUFFIX,ytimg.com,🎯 代理服务
  - DOMAIN-SUFFIX,youtu.be,🎯 代理服务
  - DOMAIN-SUFFIX,googletagmanager.com,🎯 代理服务
  - DOMAIN-SUFFIX,google-analytics.com,🎯 代理服务
  - DOMAIN-SUFFIX,googleadservices.com,🎯 代理服务
  - DOMAIN-SUFFIX,googlesyndication.com,🎯 代理服务
  - DOMAIN-SUFFIX,doubleclick.net,🎯 代理服务

  # 国内域名/IP直连
  - GEOIP,CN,DIRECT
  # 最终兜底规则：不匹配以上规则的流量直连
  - MATCH,DIRECT
